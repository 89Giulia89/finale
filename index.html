<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Attività AI</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* Bottone immagine */
.bottone {
  width: 90%;
  max-width: 500px;
  cursor: pointer;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}

.bottone:hover {
  transform: scale(1.05);
}

/* Popup */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

/* Contenuto */
#contenuto {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  height: 85%;
  background: white;
  border-radius: 20px;
  padding: 10px;
}

/* Chiudi */
.chiudi {
  float: right;
  background: red;
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>✨ Crea un finale alternativo con l'AI</h2>

<img src="cappuccetto.png"
     class="bottone"
     onclick="apri()">

<div id="popup">
  <div id="contenuto">

    <button class="chiudi" onclick="chiudi()">Chiudi</button>

    <iframe src="https://student.magicschool.ai/s/join?joinCode=pfNaMg"
            width="100%"
            height="90%"
            style="border:none;">
    </iframe>

  </div>
</div>

<script>
function apri() {
  document.getElementById("popup").style.display = "block";
}

function chiudi() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
